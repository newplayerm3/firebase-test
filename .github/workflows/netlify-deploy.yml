name: Deploy to Netlify

# 触发条件：当代码推送到main分支或创建Pull Request时
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 环境变量
env:
  NODE_VERSION: '18'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: 🛒 Checkout repository
      uses: actions/checkout@v4
      with:
        # 获取完整的git历史，用于生成版本信息
        fetch-depth: 0
    
    # 2. 设置Node.js环境
    - name: 🚀 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'
    
    # 3. 安装后端依赖（如果需要）
    - name: 📦 Install backend dependencies
      run: |
        if [ -f backend/package.json ]; then
          cd backend
          npm ci
          cd ..
        else
          echo "No backend package.json found, skipping backend dependencies"
        fi
    
    # 4. 构建项目
    - name: 🔨 Build project
      run: |
        echo "Building Smart College Advisor..."
        
        # 创建构建目录
        mkdir -p dist
        
        # 复制所有前端文件到dist目录
        cp -r assets/ dist/
        cp index.html dist/
        cp config.js dist/
        cp firebase-*.js dist/
        cp google-login-debug.html dist/
        
        # 如果有其他静态文件，也复制过去
        if [ -f README.md ]; then cp README.md dist/; fi
        if [ -f requirements.txt ]; then cp requirements.txt dist/; fi
        
        # 创建_redirects文件用于SPA路由
        echo "/* /index.html 200" > dist/_redirects
        
        # 创建netlify.toml配置文件
        cat > dist/netlify.toml << EOF
        [build]
          publish = "."
          
        [build.environment]
          NODE_VERSION = "${{ env.NODE_VERSION }}"
          
        [[redirects]]
          from = "/*"
          to = "/index.html"
          status = 200
          
        [[headers]]
          for = "/*"
          [headers.values]
            X-Frame-Options = "DENY"
            X-XSS-Protection = "1; mode=block"
            X-Content-Type-Options = "nosniff"
            Referrer-Policy = "strict-origin-when-cross-origin"
            
        [[headers]]
          for = "/assets/*"
          [headers.values]
            Cache-Control = "public, max-age=31536000, immutable"
        EOF
        
        echo "Build completed successfully!"
        ls -la dist/
    
    # 5. 部署到Netlify
    - name: 🚀 Deploy to Netlify
      uses: nwtgck/actions-netlify@v3.0
      with:
        # 要部署的目录
        publish-dir: './dist'
        # 生产环境部署
        production-branch: main
        # GitHub Token (用于更新PR状态)
        github-token: ${{ secrets.GITHUB_TOKEN }}
        # 部署消息
        deploy-message: "Deploy from GitHub Actions - ${{ github.event.head_commit.message }}"
        # 启用提交状态
        enable-commit-status: true
        # 启用PR评论
        enable-pull-request-comment: true
        # 覆盖现有PR评论
        overwrites-pull-request-comment: true
        # 别名（用于预览部署）
        alias: deploy-preview-${{ github.event.number }}
      env:
        # Netlify Auth Token
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        # Netlify Site ID
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      timeout-minutes: 10
    
    # 6. 部署成功通知
    - name: 🎉 Deployment Success
      if: success()
      run: |
        echo "🎉 Deployment completed successfully!"
        echo "🌐 Your site should be available at your Netlify URL"
        echo "📊 Build info:"
        echo "  - Branch: ${{ github.ref_name }}"
        echo "  - Commit: ${{ github.sha }}"
        echo "  - Message: ${{ github.event.head_commit.message }}"
    
    # 7. 部署失败通知
    - name: 💥 Deployment Failed
      if: failure()
      run: |
        echo "💥 Deployment failed!"
        echo "🔍 Please check the logs above for error details"
        echo "🛠️  Common issues:"
        echo "  - Check if NETLIFY_AUTH_TOKEN is correctly set"
        echo "  - Check if NETLIFY_SITE_ID is correctly set"
        echo "  - Verify build process completed successfully"
