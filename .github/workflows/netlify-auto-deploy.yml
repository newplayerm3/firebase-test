name: 🚀 Netlify Auto Deploy

# 触发条件：推送到main分支或手动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

# 环境变量
env:
  NODE_VERSION: '18'

jobs:
  deploy:
    name: 🚀 Deploy to Netlify
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: 🛒 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整git历史
    
    # 2. 设置Node.js环境
    - name: 🚀 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    # 3. 准备部署文件
    - name: 🔨 Prepare Deployment Files
      run: |
        echo "📁 Preparing Smart College Advisor for deployment..."
        
        # 创建部署目录
        mkdir -p deploy
        
        # 复制静态版本项目（优先使用）
        if [ -d "static-version" ]; then
          echo "📦 Using static-version for deployment..."
          cp -r static-version/* deploy/
        else
          echo "📦 Using main project files for deployment..."
          # 复制主要文件
          cp -r assets/ deploy/ 2>/dev/null || echo "No assets directory found"
          cp index.html deploy/ 2>/dev/null || echo "No index.html found"
          cp config.js deploy/ 2>/dev/null || echo "No config.js found"
          
          # 复制其他重要文件
          cp *.html deploy/ 2>/dev/null || echo "No HTML files found"
          cp *.js deploy/ 2>/dev/null || echo "No JS files found"
        fi
        
        # 确保netlify.toml存在
        if [ ! -f "deploy/netlify.toml" ]; then
          echo "📝 Creating netlify.toml configuration..."
          cat > deploy/netlify.toml << 'EOF'
        [build]
          publish = "."
          command = "echo 'No build step required for static site'"
        
        # SPA路由重定向
        [[redirects]]
          from = "/*"
          to = "/index.html"
          status = 200
        
        # 安全头设置
        [[headers]]
          for = "/*"
          [headers.values]
            X-Frame-Options = "DENY"
            X-XSS-Protection = "1; mode=block"
            X-Content-Type-Options = "nosniff"
            Referrer-Policy = "strict-origin-when-cross-origin"
            Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self';"
        
        # 静态资源缓存
        [[headers]]
          for = "/assets/*"
          [headers.values]
            Cache-Control = "public, max-age=31536000, immutable"
        
        [[headers]]
          for = "/*.js"
          [headers.values]
            Cache-Control = "public, max-age=86400"
        
        [[headers]]
          for = "/*.css"
          [headers.values]
            Cache-Control = "public, max-age=86400"
        EOF
        fi
        
        # 创建_redirects文件（备用方案）
        echo "/* /index.html 200" > deploy/_redirects
        
        echo "✅ Deployment preparation completed!"
        echo "📁 Deploy directory contents:"
        ls -la deploy/
    
    # 4. 部署到Netlify
    - name: 🚀 Deploy to Netlify
      uses: nwtgck/actions-netlify@v3.0
      with:
        # 部署目录
        publish-dir: './deploy'
        # 生产分支
        production-branch: main
        # GitHub Token
        github-token: ${{ secrets.GITHUB_TOKEN }}
        # 部署消息
        deploy-message: |
          🚀 Auto Deploy Smart College Advisor
          🌿 Branch: ${{ github.ref_name }}
          📝 Commit: ${{ github.sha }}
          💬 Message: ${{ github.event.head_commit.message }}
          ⏰ Time: ${{ github.event.head_commit.timestamp }}
        # 启用状态检查
        enable-commit-status: true
        enable-pull-request-comment: true
        overwrites-pull-request-comment: true
        # 预览部署别名
        alias: ${{ github.event.number && format('pr-{0}', github.event.number) || '' }}
      env:
        # 使用您提供的环境变量
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROJECT_ID }}
      timeout-minutes: 10
    
    # 5. 部署成功通知
    - name: 🎉 Deployment Success
      if: success()
      run: |
        echo "🎉 Smart College Advisor deployed successfully!"
        echo "🌐 Your site should be live at your Netlify domain"
        echo ""
        echo "📊 Deployment Details:"
        echo "  🌿 Branch: ${{ github.ref_name }}"
        echo "  📝 Commit: ${{ github.sha }}"
        echo "  💬 Message: ${{ github.event.head_commit.message }}"
        echo "  ⏰ Time: $(date)"
        echo ""
        echo "🔗 Check your Netlify dashboard for the live URL!"
        echo "📱 Static version is now live and ready for users!"
    
    # 6. 部署失败处理
    - name: 💥 Deployment Failed
      if: failure()
      run: |
        echo "💥 Deployment failed!"
        echo ""
        echo "🔍 Troubleshooting steps:"
        echo "1. Check if NETLIFY_TOKEN is correctly set in GitHub Secrets"
        echo "2. Check if NETLIFY_PROJECT_ID is correctly set in GitHub Secrets"
        echo "3. Verify your Netlify token has the correct permissions"
        echo "4. Check the build logs above for specific error messages"
        echo ""
        echo "🛠️ Required GitHub Secrets:"
        echo "  - NETLIFY_TOKEN: Your Netlify personal access token"
        echo "  - NETLIFY_PROJECT_ID: Your Netlify site ID"
        echo ""
        echo "📚 For help, check: https://docs.netlify.com/configure-builds/get-started/"
        echo "🔧 Verify your Netlify project settings and token permissions"
