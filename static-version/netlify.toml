[build]
  # 发布目录：当前目录
  publish = "."
  # 不需要构建命令，这是纯静态项目
  command = "echo 'Static site - no build required'"

# 构建环境设置
[build.environment]
  # 跳过依赖安装
  SKIP_DEPENDENCY_INSTALL = "true"
  # 跳过缓存
  SKIP_CACHE = "true"

# SPA路由重定向
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 安全头设置
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self';"

# 静态资源缓存
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# 忽略文件
[[ignore]]
  # 忽略所有非静态文件
  ignore = "*.md"
  ignore = "*.bat"
  ignore = "*.ps1"
  ignore = "deploy/"
