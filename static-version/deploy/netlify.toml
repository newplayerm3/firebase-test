# Netlify配置文件
# 智能升学助手静态版本部署配置
# 纯静态网站，无需构建步骤

[build]
  # 发布目录（根目录）
  publish = "."
  
  # 构建命令（静态网站无需构建）
  command = "echo 'Static site - no build required'"

# 明确指定不需要安装依赖
[build.environment]
  # Node.js版本（可选，因为不需要构建）
  NODE_VERSION = "18"
  # 禁用Python依赖安装
  PIP_FLAGS = "--no-deps"

# SPA路由重定向规则
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 安全头部设置
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;"

# 静态资源缓存
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# 错误页面
[[redirects]]
  from = "/404"
  to = "/index.html"
  status = 404

# 性能优化
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# 禁用自动依赖安装
[build.processing]
  skip_processing = false

# 明确指定这是静态网站
[build.processing.html]
  pretty_urls = true

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.images]
  compress = false
