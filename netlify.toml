# Netlify配置文件
# 智能升学顾问网站部署配置

[build]
  # 发布目录（根目录）
  publish = "."
  
  # 构建命令（静态网站无需构建）
  command = "echo 'No build step required for static site'"

[build.environment]
  # Node.js版本
  NODE_VERSION = "18"

# SPA路由重定向规则
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API代理（如果需要）
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# 安全头部设置
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://js.stripe.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.2brain.ai https://portal.2brain.ai https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com; frame-src 'self' https://accounts.google.com;"

# 静态资源缓存
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# 错误页面
[[redirects]]
  from = "/404"
  to = "/index.html"
  status = 404
